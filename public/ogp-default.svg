<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="反省の色診断 OGP">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="100%" stop-color="#1d1d1d" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.18" />
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="56" y="56" width="168" height="36" rx="18" fill="#ffd600" />
  <text x="84" y="81" font-size="18" font-weight="700" letter-spacing="0.18em" fill="#111111" font-family="'BIZ UDPGothic', 'Noto Sans JP', sans-serif">16 TYPES</text>
  <text x="72" y="200" font-size="82" font-weight="900" fill="#ffffff" font-family="'BIZ UDPGothic', 'Noto Sans JP', sans-serif">反省の色診断</text>
  <text x="72" y="274" font-size="34" fill="#d4d4cf" font-family="'Noto Sans JP', sans-serif">あなたの反省、何色に見えていますか？</text>
  <text x="72" y="334" font-size="24" fill="#b8b8b2" font-family="'Noto Sans JP', sans-serif">12問でわかる、16タイプのネタ診断アプリ</text>
  <g filter="url(#shadow)">
    <rect x="72" y="390" width="470" height="168" rx="28" fill="#f5f5f2" />
    <rect x="72" y="390" width="14" height="168" rx="7" fill="#0aafbe" />
    <circle cx="132" cy="448" r="22" fill="#0aafbe" />
    <text x="172" y="435" font-size="24" font-weight="700" fill="#006270" font-family="'BIZ UDPGothic', 'Noto Sans JP', sans-serif">まず免責シアン</text>
    <text x="172" y="474" font-size="18" fill="#333333" font-family="'Noto Sans JP', sans-serif">謝意より先に、責任整理の輪郭が</text>
    <text x="172" y="501" font-size="18" fill="#333333" font-family="'Noto Sans JP', sans-serif">見えやすいらしい。</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="592" y="390" width="536" height="168" rx="28" fill="#ffffff" />
    <rect x="592" y="390" width="14" height="168" rx="7" fill="#d63483" />
    <circle cx="652" cy="448" r="22" fill="#d63483" />
    <text x="692" y="435" font-size="24" font-weight="700" fill="#8e1f58" font-family="'BIZ UDPGothic', 'Noto Sans JP', sans-serif">逆ギレマゼンタ</text>
    <text x="692" y="474" font-size="18" fill="#333333" font-family="'Noto Sans JP', sans-serif">反省の場にいるはずなのに、謝意より先に</text>
    <text x="692" y="501" font-size="18" fill="#333333" font-family="'Noto Sans JP', sans-serif">感情の熱が見えやすいらしい。</text>
  </g>
  <text x="72" y="602" font-size="20" fill="#ffd600" font-family="'BIZ UDPGothic', 'Noto Sans JP', sans-serif">https://ryo909.github.io/hansei-color/</text>
</svg>
