<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <script>
      (function (location) {
        if (location.search[1] !== '/') return;
        const decoded = location.search
          .slice(1)
          .split('&')
          .map(function (part) {
            return part.replace(/~and~/g, '&');
          })
          .join('?');
        window.history.replaceState(
          null,
          '',
          location.pathname.slice(0, -1) + decoded + location.hash,
        );
      })(window.location);
    </script>
    <meta
      name="description"
      content="反省しているつもりでも、見えている色は別かもしれません。反省の出方を観測するネタ診断アプリ。"
    />
    <title>反省の色診断</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
